 f93_fed_background.1.name: "Ethical Slavery?"
 f93_fed_background.1.desc: "The Assembly has passed the §Y$treaties_separate_ethical_partners$§! bill, it will require us to free all slaves and adhere to federal policy. We can either accept and move on, or leave the $MY_FEDERATION$."
 f93_fed_background.1.a: "§GWe accept the conditions.§!"
 f93_fed_background.1.b: "§RWe cannot accept!§!"
