l_korean:
 MY_FEDERATION: "§Y[Root.Federation.GetName]§!"
 MY_FEDERATION_PRESIDENT: "§Y[Root.Federation.Federation_Leader.GetRulerName]§!"
 f93_fed_election.1.name: "The Election"
 f93_fed_election.1.desc: "Our $MY_FEDERATION$ has become more and more centralized, institutions and norms have taken shape and many have been codified. Now it is simply unavoidable that we elect a leader. "
 f93_fed_election.1.nominate: "Nominate the §G[Root.GetRulerName]§!"S
 f93_fed_election.1.boost_nominate: "Lobby for our Candidate"
 f93_fed_election.1.revoke_nominate: "Retract nomination."
 f93_fed_election.1.end_nominate: "Let the ballots be casted"
 f93_fed_election.101.name: "The Charter"
 f93_fed_election.101.desc: "The era of rotating Presidency by states is over. The members of the members of $MY_FEDERATION$ have signed a binding charter to ensure the office's legitimacy via general elections. While this High Assembly of leaders has yet to define the specific mechanics of the vote, the intent is clear: Authority must be earned, not inherited by turn or power. A long line of reforms now awaits to transform this gathering into a true Grand Assembly of representation."
 f93_fed_election.101.a: "One signature after another!"
 f93_fed_election.301.name: "Administrative Focus"
 f93_fed_election.301.desc: "Federal elections have concluded and the Assembly awaits the President's direction for the administration's new course."
 f93_fed_election.301.a: "$f93_pres_mod_mil$"
 f93_fed_election.301.b: "$f93_pres_mod_sci$"
 f93_fed_election.301.c: "$f93_pres_mod_job$"
 f93_fed_election.301.d: "$f93_pres_mod_adm$"
 f93_fed_election.302.name: "Grand Assembly"
 f93_fed_election.302.desc: "The transition for power is done. The $MY_FEDERATION$ has officially inaugurated the Grand Assembly, effectively dissolving the High Assembly and making way for democratic representation."
 f93_fed_election.302.a: "A strong foundation for our shared future!"
 f93_fed_election.3.name: "Election Results"
 f93_fed_election.3.desc: "§Y[Root.Federation.Federation_Leader.GetRulerName]§! has been Elected the President of $MY_FEDERATION$."
 f93_fed_election.3.a: "Long may they reign!"
 f93_fed_election.4.name: "Vote of no confidence"
 f93_fed_election.4.desc: "Formal proceedings have begun as many in the Assembly claim President [Root.Federation.Federation_Leader.GetRulerName] has shown to be unfit for office. The motion of impeachment is now on the floor as the future of the Presidency remains uncertain."
 f93_fed_election.4.a: "He was doing a fine job so far."
 f93_fed_election.4.b: "Get this baboon out of here."
 f93_fed_election.6.name: "Breaking News: Nothing Changed"
 f93_fed_election.6.desc: "The Vote of No Confidence has failed, confirming the continued support for the President's mandate. $MY_FEDERATION_PRESIDENT$ will remain in office."
 f93_fed_election.6.a: "and glad we are"
 f93_fed_election.6.b: "CURSES!"
 f93_fed_election.7.name: "Breaking News: Elections Soon"
 f93_fed_election.7.desc: "The Vote of No Confidence has passed, signaling an end to the current President's mandate. $MY_FEDERATION_PRESIDENT$ will step down and make way for new leadership."
 f93_fed_election.7.a: "Maybe not everyone deserves a vote."
 f93_fed_election.7.b: "good riddance"
 f93_fed_election.8.name: "Breaking News: Elections Soon"
 f93_fed_election.8.desc: "Terrible news have reached the citizens of the federation, President $MY_FEDERATION_PRESIDENT$ has passed away. The federal council currently prepares for new elections and an interim president has been chosen to govern until then."
 f93_fed_election.8.a: "rip bozo."
