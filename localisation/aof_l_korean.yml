 f93_fed_market.3.name: "Capitol One"
 f93_fed_market.3.desc: "The Assembly recently passed the bill for a centralized federal market, and today has the assigned commission submitted its plan. The plan proposes the construction of a massive space station capable of housing the federal market exchange and administrative apparatus. The Assembly has waived the project through and construction will begin shortly."
 f93_fed_market.3.a: "A great plan!"
 f93_fed_market.301.name: "Capitol One Construction"
 f93_fed_market.301.desc: "Work has begun and everyone is proudly waving their Arms/Tentacles/Rock outcroppings and other appendages. Once the Fanfare is gone all that is left is the bill."
 f93_fed_market.301.a: "An expansive plan!"
 f93_fed_market.4.name: "Capitol One Finished"
 f93_fed_market.4.desc: "With construction complete, Capitol One is nearly ready to take its place as the Federation's capital. Its engines will finish testing in just a few days, and then it will finally settle into its new orbit!."
 f93_fed_market.4.a: "Long live the Federation!"

 f93_federation_one_station: "Capitol One"
 f93_federation_one_station_desc: "The mobile capital and Market Exchange of the federation. It houses the Assembly Chamber, executive offices, and countless habitation modules for every member species. The station periodically relocates to member worlds with the highest economic outputs.\n$F93_trade_volume$"
 F93_trade_volume: "\nThe federation's Market Volume is based on £trade£&£consumer_goods£."