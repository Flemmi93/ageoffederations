# Events
 f93_aof_election.1.name: "ยงSFederal Electionsยง!"
 f93_aof_election.1.desc: "The wheel of democracy has begun to turn, setting the stage for a year of federal campaigning. Assemblymen have already begun loosening their loyalties from this closing legislature in search of new coalitions, and so must we.\nBy ensuring our representatives hold their seats and even capture new ones, our nation may claim the $aof_fed_presy$ and occupy the office!"
 f93_aof_election.1.nominate: "ยฃfavorยฃ Nominate ยงG[Root.GetRulerName]ยง! ยฃfavorยฃ"
 f93_aof_election.1.boost_nominate: "ยฃtributaryยฃ  Further our campaign efforts  ยฃtributaryยฃ"
 f93_aof_election.1.revoke_nominate: "ยฃpolitical_powerยฃ  Retract nomination.  ยฃpolitical_powerยฃ"
 f93_aof_election.1.end_nominate: "ยฃfocus_developmentยฃ  Let the ballots be casted  ยฃfocus_developmentยฃ"
 f93_aof_election.101.name: "The Charter"
 f93_aof_election.101.desc: "The era of rotating $aof_fed_presy$ by states is over. The members of the $MY_FEDERATION$ have signed a binding charter to ensure the ยงroffice'sยง! legitimacy via general elections. While this High Assembly of leaders has yet to define the specific mechanics of the vote, the intent is clear: Authority must be earned, not inherited by turn or power. A long line of reforms now awaits to transform this gathering into a true Grand Assembly of representation."
 f93_aof_election.101.a: "One signature after another!"
 f93_aof_election.301.name: "Administrative Focus"
 f93_aof_election.3.name: "Election Results"
 f93_aof_election.3.desc: "The final ballots have been counted and the results are clear. The $MY_FED_PRES_COUNTRY$ has secured the majority, with $MY_FED_PRES$ set to occupy the $aof_fed_presy$ of the $MY_FEDERATION$."
 f93_aof_election.3.b.desc: "The final ballots have been counted and the results are clear. The $MY_FED_PRES_COUNTRY$ has secured the majority, with $MY_FED_PRES$ set to occupy the $aof_fed_presy$ of the $MY_FEDERATION$.\n\nOfficials at $f93_federation_one_station$ have begun preparing the transition phase for the new legislature."
 f93_aof_election.3.a: "The Assembly is seated"
 f93_aof_election.301.desc: "Now that the first months of this legislature have concluded, awaits your coalition directions for this legislature's course.\nThe citizens are eager to see if your plan aligns with the promises that brought you to power."
 f93_aof_election.301.a: "ยฃtrade_protectionยฃ  $f93_pres_mod_mil$  ยฃtrade_protectionยฃ"
 f93_aof_election.301.b: "ยฃresearchยฃ  $f93_pres_mod_sci$  ยฃresearchยฃ"
 f93_aof_election.301.c: "ยฃeconomyยฃ  $f93_pres_mod_job$  ยฃeconomyยฃ"
 f93_aof_election.301.d: "ยฃsystemยฃ  $f93_pres_mod_adm$  ยฃsystemยฃ"
 f93_aof_election.302.name: "Grand Assembly"
 f93_aof_election.302.desc: "The transition of power is complete. The $MY_FEDERATION$ has officially inaugurated the Grand Assembly, effectively dissolving the High Assembly and making way for democratic representation.\n\nIt's a bridge between worlds."
 f93_aof_election.302.a: "A strong foundation for our shared future!"
 f93_aof_election.4.name: "Vote of no confidence"
 f93_aof_election.4.desc: "Formal proceedings have begun to end the $MY_FED_PRES$ยงr'sยง! term and with it the current legislature. The motion of impeachment is now on the floor as the future of the $aof_fed_presy$ remains uncertain."
 f93_aof_election.4.a: "Vote to have the legislature continue."
 f93_aof_election.4.b: "Vote to have the legislature end prematurely."
 f93_aof_election.6.name: "Breaking News: Nothing Changed"
 f93_aof_election.6.desc: "The Vote of No Confidence has failed, confirming the continued support for the $aof_fed_pres$ยงr'sยง! mandate. $MY_FED_PRES$ will remain in office."
 f93_aof_election.6.a: "and glad we are"
 f93_aof_election.6.b: "Save the slogans for next time..."
 f93_aof_election.7.name: "Breaking News: Elections Soon"
 f93_aof_election.7.desc: "The Vote of No Confidence has passed, signaling an end to the current $aof_fed_pres$ยงr'sยง! mandate. $MY_FED_PRES$ will step down and make way for new leadership."
 f93_aof_election.7.a: "Maybe not everyone deserves a vote."
 f93_aof_election.7.b: "good riddance"
 f93_aof_election.8.name: "Federal Summit"
 f93_aof_election.8.desc: "The docking bays of Starlight One are crowded with gilded shuttles of the federation's elite. They are arriving from all sectors to gather at the summit, bringing with them a mix of private grievances, trade demands, and old rivalries.\n\nWhat have you brought?"
 f93_aof_election.8.a: "ยงrFederal Construction Contracts!ยง!"
 f93_aof_election.8.a_desc: "$aof_fed_presl$ Action: We will gain ยงG1ยง! Permit to build a $building_aof_federal_holdings$."
 f93_aof_election.8.b: "ยงrHand a Contract to someone elseยง!"
 f93_aof_election.8.b_desc: "$aof_fed_presl$ Action: A random valid member of the Federation will gain ยงG1ยง! Permit to build a $building_aof_federal_holdings$."
 f93_aof_election.8.c: "someone else can do it (human)"
 f93_aof_election.8.c_desc: "A random valid member of the Federation will gain ยงG1ยง! Permit to build a $building_aof_federal_holdings$."
 f93_aof_election.8.d: "someone else can do it (NPC)"
 f93_aof_election.8.d_desc: "A random valid member of the Federation will gain ยงG1ยง! Permit to build a $building_aof_federal_holdings$."
 f93_aof_election.8.e: "A new reform"
 f93_aof_election.8.f: "Some blackmail"
 f93_aof_election.8.f_desc: "We gain ยงG10ยง! Favors with a random member"
 f93_aof_election.8.g: "Good News, Everyone!"
 f93_aof_election.8.g_desc: "We gain ยงG2ยง! Favors with a random member"
 f93_aof_election.9.name: "Federal Enclave!"
 f93_aof_election.9.desc: "It looks like we have been the great winners of the Federal Summit. Not only have we gotten what we came for, but also received ยงG1ยง! Permit to construct a ยงY$building_aof_federal_holdings$ยง! on one of our capital planets!"
 f93_aof_election.9.a: "What a weekend"
 f93_aof_galcom.0.name: "Shield and Spear"
 f93_aof_galcom.0.desc: "The Galactic Senate has consolidated emergency powers upon a Galactic Custodian to act as its spearhead. Yet, the Federal Council remains wary, unsure if this blade will be used as intended and then laid down or turned against any who dare to stand in its way."
 f93_aof_galcom.0.a: "The Federation's shield will stand ready! "
 f93_aof_galcom.0.b: "Don't you worry about it"
 f93_aof_galcom.1.name: "Throne of Tyranny"
 f93_aof_galcom.1.desc: "The Galactic Community has lost its way, and we can already see the Throne of Tyranny being bolted to the floor. The $MY_FEDERATION$ must refuse to kneel to it and leave this foul place now."
 f93_aof_galcom.1.a: "You will kneel too!"
 f93_aof_galcom.1.b: "Before it's too late..."
 f93_aof_galcom.1.c: "Not my Problem."
 f93_aof_galcom.1.d: "This Alliance was weak anyways."
 f93_aof_background.10.name: "High Assembly"
 f93_aof_background.10.desc: "The last vote has been cast and the last bill signed, tomorrow will the Grand Assembly be dissolved and reduced to a High Assembly. Uncertainty and anger has spread through the news."
 f93_aof_background.10.a: "A step back."
 f93_aof_background.11.name: "Party Formation"
 f93_aof_background.11.desc: "The Federation_Name has gradually repositioned itself within the Galactic Senate, with member representatives increasingly likely to vote in unison on key resolutions.\nWhile these voting patterns are far from a formal party and internal deviancy remains a factor, the emergence of this โBlocโ behavior has not gone unnoticed."
 f93_aof_background.11.a: "Galactic affairs are Federal affairs too."
 f93_aof_background.11.b: "We need to outpace them!"
 f93_aof_background.11.c: "This makes us less important..."
 f93_aof_background.12.name: "A United Front"
 f93_aof_background.12.desc: "The Federation_Name has finalized its transition into a disciplined voting bloc. This shift is a direct response to the foreign overlords and hostile alliances that seek to undermine us. By standing as a United Front, we ensure that the needs of our citizens are heard loudly and clearly, standing firm against those who do not share our values.\n\nWhat once began as a mere agreement of coordination has shaped to become a diplomatic powerhouse."
 f93_aof_background.12.a: "Long live the Federation!"
 f93_aof_background.13.name: "Starlight One Evacuates"
 f93_aof_background.13.desc: "The war has reached our doorstep, and the order to initiate an emergency departure for Starlight One from Planet_Nameโs orbit has been given.  Evacuations are underway, and non- essential personnel are being hurried to the docking bays as the station's thrusters are already pushing it out of orbit. For the remainder of the conflict, the Assembly chambers must stay vacant and meetings be hosted digitally, slowing or even halting many government operations.\nThe Station is now over ยงY[f93_has_federation_one.GetName]ยง! in the ยงY[f93_has_federation_one.System.GetName]ยง!."
 f93_aof_background.13.a: "Get them out of here!"

