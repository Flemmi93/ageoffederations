 f93_aof_background.1.name: "Ethical Slavery?"
 f93_aof_background.1.desc: "The Assembly has passed the ยงY$treaties_separate_ethical_partners$ยง! bill, it will require us to free all slaves and adhere to federal policy. We can either accept and move on, or leave the $MY_FEDERATION$.\n\nEnforced Policies:$TABBED_NEWLINE$- Bans $policy_slavery$$TABBED_NEWLINE - $Bans $refugees_not_allowed$$TABBED_NEWLINE$ - Bans $interference_aggressive$"
