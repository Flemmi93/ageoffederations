# Laws
 succession_type_election: "Elections"
 succession_type_election_desc: "As the $aof_fed_presy$ gains more power, its office must be chosen by a governing body to ensure its legitimacy."
 assembly_high: "High Council"
 assembly_high_desc: "A High Assembly of our most vital leaders will dictate the affairs of the federation.\n\nยงRWARNINGยง!:Removing the Grand Assembly might impact a lot of other laws."
 assembly_grand: "Grand Assembly"
 assembly_grand_desc: "A Grand Assembly of democratically elected representatives from all federal worlds comes together to shape the federation's future. Here, every planet matters."
 assembly_none: "Assortment of Delegates"
 assembly_none_desc: "With power being handed out at random or at the strongest or those with enough money to buy everyone else, hardly anyone is even interested in partaking in any formal governing body, as such, only a handful of hopefuls and wanna bes are collected here to make impetuous demands and suggestions.\n\nIf we want a real assembly of dignitaries we need to introduce formal ยงGElectionsยง! to the $MY_FEDERATION$."
 fed_market_joined_desc: "To further federal cooperation, it's Market Volume can be directly converted into resources. The Federation's Market Volume is shown at Starlight One."
 fed_market_basic: "Basic Policy"
 fed_market_basic_desc: "$fed_market_joined_desc$\n\nThe Basic Policy:  Market Volume รท Member Count x 5% รท 3 = Energy Amount, Mineral Amount, Unity Amount"
 fed_market_strategic: "Strategic Policy"
 fed_market_strategic_desc: "$fed_market_joined_desc$\n\nMarket Volume รท Member Count x 5% รท 25 = Exotic Gases Amount, Volatile Motes Amount, Rare Crystals Amount"
 fed_market_military: "Military Policy"
