 diplomatic_bloc_default_desc: "Members align a portion of their diplomatic weight to the $aof_fed_pres$, ensuring the federation speaks with a clear voice in foreign galactic affairs."
 diplomatic_bloc_common_voice: "Common Voice"
 diplomatic_bloc_common_voice_desc: "Members align a share of their diplomatic weight to the $aof_fed_pres$, ensuring the federation speaks with a common voice in foreign galactic affairs."
 diplomatic_bloc_clear_voice: "Clear Voice"
 diplomatic_bloc_clear_voice_desc: "Members align a chunk of their diplomatic weight to the $aof_fed_pres$, ensuring the federation speaks with a clearvoice in foreign galactic affairs."
 diplomatic_bloc_united: "$resolution_custodian_united_front$"
 diplomatic_bloc_united_desc: "Members align a majority of their diplomatic weight to the $aof_fed_pres$, ensuring the federation presents as a united front in foreign galactic affairs."
