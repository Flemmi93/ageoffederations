 f93_aof_background.5.desc: "A rumor has reached your desk!\n An alliance of Assemblymen has quietly organized to move for a ยงBVote of No Confidenceยง! in the leadership of $aof_fed_pres$ $MY_FED_PRES$ and the $MY_FED_PRES_COUNTRY$."
 f93_aof_background.5.a: "This is outrageous!"
 f93_aof_market.3.name: "Starlight One"
 f93_aof_market.3.desc: "The Assembly has recently passed the bill for a common federal market, and today has the assigned commission submitted its plan.\n They propose the construction of a massive space station, it would be capable of housing the federal market exchange and federal administrative apparatus. The Assembly has waived the project through, and orbital construction will begin soon."
 f93_aof_market.3.a: "A great plan!"
 f93_aof_market.301.name: "Starlight One Construction"
 f93_aof_market.301.desc: "Work has begun and everyone is proudly waving their Arms/Tentacles/Rock outcroppings and other appendages. Once the Fanfare is gone all that is left is the bill."
 f93_aof_market.301.a: "An expansive plan!"
 f93_aof_market.4.name: "Starlight One Finished"
 f93_aof_market.4.desc: "With construction complete, Starlight One is nearly ready to take its place as the Federation's capital. Its engines will finish testing in just a few days, and then it will finally settle into its new orbit!."
 f93_aof_market.4.a: "Long live the Federation!"
