# Categories
 law_category_assembly: "Electorate"
 law_category_assembly_desc: "These Laws govern who is allowed to vote."
 law_category_aof_accords: "Federation Accords"
 law_category_aof_accords_desc: "We have signed an accord to uphold common standards."
 law_category_aof_market: "Federal Market"
 law_category_aof_market_desc: "We are more than a collection of states that happen to exist in one alliance. Our markets are interconnected and Federal Policy can have major impact on them."
 law_category_diplomatic_block: "Diplomatic Bloc"
 law_category_diplomatic_block_desc: "Our Federation can display different levels of unity towards outside groups."

# Events
 f93_aof_election.1.name: "Federal Elections"
 f93_aof_election.1.desc: "The wheel of democracy has begun to turn, setting the stage for a year of federal campaigning. Assemblymen have already begun loosening their loyalties from this closing legislature in search of new coalitions, and so must we.\nBy ensuring our representatives hold their seats and even capture new ones, our nation may claim the Presidency and occupy the office!"
 f93_aof_election.1.nominate: "Nominate the §G[Root.GetRulerName]§!"S
 f93_aof_election.1.boost_nominate: "Further our campaign efforts"
 f93_aof_election.1.revoke_nominate: "Retract nomination."
 f93_aof_election.1.end_nominate: "Let the ballots be casted"
 f93_aof_election.101.name: "The Charter"
 f93_aof_election.101.desc: "The era of rotating Presidency by states is over. The members of the $MY_FEDERATION$ have signed a binding charter to ensure the office's legitimacy via general elections. While this High Assembly of leaders has yet to define the specific mechanics of the vote, the intent is clear: Authority must be earned, not inherited by turn or power. A long line of reforms now awaits to transform this gathering into a true Grand Assembly of representation."
 f93_aof_election.101.a: "One signature after another!"
 f93_aof_election.301.name: "Administrative Focus"
 f93_aof_election.3.name: "Election Results"
 f93_aof_election.3.desc: "The final ballots have been counted and the results are clear. The $MY_FEDERATION_PRESIDENT_COUNTRY$ has secured the majority, with $MY_FEDERATION_PRESIDENT$ set to occupy the Presidency of the $MY_FEDERATION$."
 f93_aof_election.3.b.desc: "The final ballots have been counted and the results are clear. The $MY_FEDERATION_PRESIDENT_COUNTRY$ has secured the majority, with $MY_FEDERATION_PRESIDENT$ set to occupy the Presidency of the $MY_FEDERATION$.\n\nOfficials at $f93_federation_one_station$ have begun preparing the transition phase for the new legislature."
 f93_aof_election.3.a: "The Assembly is seated"
 f93_aof_election.301.desc: "Now that the first months of this legislature have concluded, awaits your coalition directions for this legislature's course.\n The citizens are eager to see if your plan aligns with the promises that brought you to power."
 f93_aof_election.301.a: "$f93_pres_mod_mil$"
 f93_aof_election.301.b: "$f93_pres_mod_sci$"
 f93_aof_election.301.c: "$f93_pres_mod_job$"
 f93_aof_election.301.d: "$f93_pres_mod_adm$"
 f93_aof_election.302.name: "Grand Assembly"
 f93_aof_election.302.desc: "The transition of power is complete. The $MY_FEDERATION$ has officially inaugurated the Grand Assembly, effectively dissolving the High Assembly and making way for democratic representation.\n\nIt's a bridge between worlds."
 f93_aof_election.302.a: "A strong foundation for our shared future!"
 f93_aof_election.4.name: "Vote of no confidence"
 f93_aof_election.4.desc: "Formal proceedings have begun to end the §YPresident $MY_FEDERATION_PRESIDENT$'s§! term and with it the current legislature. The motion of impeachment is now on the floor as the future of the Presidency remains uncertain."
 f93_aof_election.4.a: "Vote to have the legislature continue."
 f93_aof_election.4.b: "Vote to have the legislature end prematurely."
 f93_aof_election.6.name: "Breaking News: Nothing Changed"
 f93_aof_election.6.desc: "The Vote of No Confidence has failed, confirming the continued support for the President's mandate. $MY_FEDERATION_PRESIDENT$ will remain in office."
 f93_aof_election.6.a: "and glad we are"
 f93_aof_election.6.b: "Save the slogans for next time..."
 f93_aof_election.7.name: "Breaking News: Elections Soon"
 f93_aof_election.7.desc: "The Vote of No Confidence has passed, signaling an end to the current President's mandate. $MY_FEDERATION_PRESIDENT$ will step down and make way for new leadership."
 f93_aof_election.7.a: "Maybe not everyone deserves a vote."
 f93_aof_election.7.b: "good riddance"
 f93_aof_election.8.name: "Federal Summit"
 f93_aof_election.8.desc: "The docking bays of Starlight One are crowded with gilded shuttles of the federation's elite. They are arriving from all sectors to gather at the summit, bringing with them a mix of private grievances, trade demands, and old rivalries.\n\nWhat have you brought?"
 f93_aof_election.8.a: "Federal Construction Contracts!"
 f93_aof_election.8.a_desc: "We will gain §G1§! Permit to build a $building_aof_federal_holdings$."
 f93_aof_election.8.b: "Hand the Contract to someone else"
 f93_aof_election.8.b_desc: "A random valid member of the Federation will gain §G1§! Permit to build a $building_aof_federal_holdings$."
 f93_aof_election.8.c: "someone else can do it (human)"
 f93_aof_election.8.c_desc: "A random valid member of the Federation will gain §G1§! Permit to build a $building_aof_federal_holdings$."
 f93_aof_election.8.d: "someone else can do it (NPC)"
 f93_aof_election.8.d_desc: "A random valid member of the Federation will gain §G1§! Permit to build a $building_aof_federal_holdings$."
 f93_aof_election.8.e: "A new reform"
 f93_aof_election.8.f: "Some blackmail"
 f93_aof_election.8.f_desc: "We gain §G10§! Favors with a random member"
 f93_aof_election.8.g: "Good News Everyone!"
 f93_aof_election.8.g_desc: "We gain §G2§! Favors with a random member"
 f93_aof_election.9.name: "Federal Enclave!"
 f93_aof_election.9.desc: "It looks like we have been the great winners of the Federal Summit. Not only have we gotten what we came for, but also received §G1§! Permit to construct a §Y$building_aof_federal_holdings$§! on one of our capital planets!"
 f93_aof_election.9.a: "What a weekend"
 f93_aof_galcom.0.name: "Shield and Spear"
 f93_aof_galcom.0.desc: "The Galactic Senate has consolidated emergency powers upon a Galactic Custodian to act as its spearhead. Yet, the Federal Council remains wary, unsure if this blade will be used as intended and then laid down or turned against any who dare to stand in its way."
 f93_aof_galcom.0.a: "The Federation's shield will stand ready! "
 f93_aof_galcom.0.b: "Don't you worry about it"
 f93_aof_galcom.1.name: "Throne of Tyranny"
 f93_aof_galcom.1.desc: "The Galactic Community has lost its way, and we can already see the Throne of Tyranny being bolted to the floor. The $MY_FEDERATION$ must refuse to kneel to it and leave this foul place now."
 f93_aof_galcom.1.a: "You will kneel too!"
 f93_aof_galcom.1.b: "Before it's too late..."
 f93_aof_galcom.1.c: "Not my Problem."
 f93_aof_galcom.1.d: "This Alliance was weak anyways."

# Buildings
 building_aof_federal_holdings: "Federal Enclave"
 building_aof_federal_holdings_desc: "TA semi-autonomous federal district that advanced the federation's strategic interests while increasing prosperity across the local sector.\n\nIt boosts Market Volume Calculation by 5%. Other boni, based on §YFederation Type§!, double at Federation Level 4, and again at Level 5\nInfo: This Building can only be build on Empire/Sector Capitals. The permit is refunded on demolition."

