# Laws
 succession_type_election: "Elections"
 succession_type_election_desc: "Elections DESCRIPTION"
 assembly_high: "High Council"
 assembly_high_desc: "A High Assembly of our most vital leaders will dictate the affairs of the federation.\n\n§RWARNING§!:Removing the Grand Assembly might impact a lot of other laws."
 assembly_grand: "Grand Assembly"
 assembly_grand_desc: "A Grand Assembly of many representatives will debate the affairs of the federation."
 assembly_none: "Assortment of Delegates"
 assembly_none_desc: "With power being handed out at random or at the strongest or those with enough money to buy everyone else, hardly anyone is even interested in partaking in any formal governing body, as such, only a handful of hopefuls and wanna bes are collected here to make impetuous demands and suggestions.\n\nIf we want a real assembly of dignitaries we need to introduce formal §GElections§! to the $MY_FEDERATION$."
 fed_market_basic: "Basic Policy"
 fed_market_basic_desc: "Market Volume ÷ Member Count x 5% ÷ 3 = Energy Amount, Food Amount, Unity Amount"
 fed_market_strategic: "Strategic Policy"
 fed_market_strategic_desc: "Market Volume ÷ Member Count x 5% ÷ 25 = Exotic Gases Amount, Volatile Motes Amount, Rare Crystals Amount"
 fed_market_military: "Military Policy"
 fed_market_military_desc: "Market Volume ÷ Member Count x 5% = Alloy Amount"
 fed_market_unity: "Unity Policy"
 fed_market_unity_desc: "Market Volume ÷ Member Count x 5% ÷ 1,75 = Alloy Amount, Unity Amount"
 diplomatic_bloc_default: "Diverse Voices"
 diplomatic_bloc_default_desc: "Members align a portion of their diplomatic weight to the President, ensuring the federation speaks with a clear voice in foreign galactic affairs."
 diplomatic_bloc_common_voice: "Common Voice"
 diplomatic_bloc_common_voice_desc: "Members align a share of their diplomatic weight to the President, ensuring the federation speaks with a common voice in foreign galactic affairs."
 diplomatic_bloc_clear_voice: "Clear Voice"
 diplomatic_bloc_clear_voice_desc: "Members align a chunk of their diplomatic weight to the President, ensuring the federation speaks with a clearvoice in foreign galactic affairs."
 diplomatic_bloc_united: "$resolution_custodian_united_front$"
 diplomatic_bloc_united_desc: "Members align a majority of their diplomatic weight to the President, ensuring the federation presents as a united front in foreign galactic affairs."
 fed_accords_none: "None"
 fed_accords_none_desc: "The federation has not negotiated any further accords between members."
 fed_accords_coop: "Cooperation Accord"
 fed_accords_coop_desc: "An accord to uplift one another and share sciences."
 fed_accords_unyielding: "Unyielding Accord"
 fed_accords_unyielding_desc: "An accord to never yield to tyranny and protect our bond."
